name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            echo $ENCODED_KEYSTORE | base64 -d > $GITHUB_WORKSPACE/keystore.jks
          else
            echo "Warning: KEYSTORE_BASE64 secret not set. Building unsigned APK."
          fi
      
      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: ./app/build/outputs/apk/release/app-release.apk
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## StopPub Release ${{ steps.get_version.outputs.VERSION }}
            
            APK de release signé prêt à être installé sur votre téléphone.
            
            ### Installation
            1. Téléchargez le fichier APK ci-dessous
            2. Activez l'installation depuis des sources inconnues sur votre téléphone si nécessaire
            3. Installez l'APK
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
